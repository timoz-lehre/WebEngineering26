<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Übung 7</title>
    <style>
        /* Die div Karte */
        .card {
            width: 210px;
            border: 1px solid gray;
            border-radius: 5px;
            text-align: center;
            padding-top: 5px; /* Ein kleiner Abstand oben, passend zum Bild */
        }

        /* Das Bild innerhalb der Karte */
        .card img {
            width: 200px;
            border: 5px solid rgb(236, 183, 191);
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div class="card">
        <img alt="Ein süßer Hund" src="https://assets.codepen.io/123865/dog.png">
        <h1>I Am Dog</h1>
    </div>
</body>
</html>
