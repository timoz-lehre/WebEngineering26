<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Übung 4</title>
    <style>
        /* Geben Sie nur die Links in der Kopfzeile an */
        header a {
            font-size: 30px;
            color: teal;
        }

        /* Geben Sie nur die Links innerhalb des Absatzes mit der ID 'dislikes' an */
        #dislikes a {
            font-weight: bold; /* Fettgedruckt */
            color: red;
        }
    </style>
</head>


<body>
    <header>
        <a href="/home">Home</a>
        <a href="/contact">Contact</a>
        <a href="/about">About</a>
    </header>
    <p>
        I like to eat <a href="/popcorn">popcorn</a> and
        <a href="/donuts">donuts</a>
    </p>
    <p id="dislikes">
        I hate eating <a href="/pickles">pickles</a> and
        <a href="/beets">beets</a>
    </p>
</body>
</html>
