<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <title>Übung 3</title>
    <style>
        /* 1. Alle li Elemente sollen Blau sein (Typ-Selektor) */
        li {
            color: blue;
        }

        /* 2. Alle Elemente der Klasse 'done' sollen graue Textfarbe haben (Klassen-Selektor) */
        .done {
            color: gray;
        }

        /* 3. Alle Elemente mit ID 'clear' sollen einen roten Hintergrund und weißen Text haben (ID-Selektor) */
        #clear {
            background-color: red;
            color: white;
        }
    </style>
</head>

<body>
    <h1>Todos</h1>
    <ul>
        <li class="done">Walk Chickens</li>
        <li>Clean Out Coop</li>
        <li class="done">Collect Chicken Eggs</li>
        <li>Incubate Chicken Eggs</li>
        <li>Hatch New Chickens!</li>
    </ul>
    <button id="clear">Clear List</button>
    <button>Add Todo</button>
</body>
